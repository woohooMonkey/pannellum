<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-MCP - 大模型控制演示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 头部对话区域 -->
  <header class="chat-header">
    <div class="chat-container">
      <h1 class="chat-title">Auto-MCP 大模型控制演示</h1>
      <div class="chat-input-wrapper">
        <input
          type="text"
          class="chat-input"
          placeholder="输入指令，如：把人物移动到右边、改变颜色为红色..."
          autocomplete="off"
        >
        <button class="chat-send-btn">发送</button>
      </div>
    </div>
  </header>

  <!-- 消息显示区域 -->
  <div class="messages-container"></div>

  <!-- 主内容区域 - 运动人物 -->
  <main class="main-content">
    <div class="character-stage">
      <div class="character">
        <!-- 头部 -->
        <div class="head">
          <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
          <div class="mouth"></div>
        </div>
        <!-- 身体 -->
        <div class="body">
          <div class="arms">
            <div class="arm left"></div>
            <div class="arm right"></div>
          </div>
        </div>
        <!-- 腿 -->
        <div class="legs">
          <div class="leg left"></div>
          <div class="leg right"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast通知容器 -->
  <div class="toast-container"></div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">工具数量:</span>
      <span class="status-value" id="tool-count">4</span>
    </div>
    <div class="status-item">
      <span class="status-label">状态:</span>
      <span class="status-value">就绪</span>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="executor.js"></script>
  <script src="app.js"></script>
</body>
</html>
